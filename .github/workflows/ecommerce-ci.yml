# ──────────────────────────────────────────────────────────────────────────────
# Ecommerce CI Pipeline
#
# Job graph:
#
#   lint ──────┐
#              ├──► smoke ──► regression ──► ai-analysis (on failure only)
#   unit-test ─┘
#
# lint and unit-test run in parallel for fastest feedback.
# smoke and regression each spin up their own fresh Docker stack so they are
# fully isolated; the stack is torn down at the end of the job regardless of
# outcome.
# ai-analysis downloads JUnit XMLs uploaded by the test jobs and calls the
# GitHub Models API to produce a Markdown summary on the Actions Summary tab.
#
# Artifacts retained for 7 days:
#   smoke-report/                 — Playwright HTML report (smoke)
#   smoke-junit/                  — JUnit XML (consumed by ai-analysis)
#   smoke-traces-screenshots/     — Traces + screenshots on failure
#   regression-report/            — Playwright HTML report (regression)
#   regression-junit/             — JUnit XML (consumed by ai-analysis)
#   regression-traces-screenshots/ — Traces + screenshots on failure
#   docker-logs-smoke/            — Container logs on smoke failure
#   docker-logs-regression/       — Container logs on regression failure
# ──────────────────────────────────────────────────────────────────────────────

name: Ecommerce CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

# dorny/test-reporter needs write access to create GitHub Check annotations
permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Syntax Check
  # Runs node --check over every .js file in tests/, pages/ and src/.
  # No Docker, no Playwright binaries — completes in seconds.
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: playwright/package-lock.json

      - name: Install dependencies
        working-directory: playwright
        run: npm ci

      - name: Syntax check — npm run lint
        working-directory: playwright
        run: npm run lint

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Unit Tests (runs in parallel with lint)
  # Node built-in test runner (node:test, no Jest/Mocha).
  # Publishes GitHub Check annotations via dorny/test-reporter.
  # ════════════════════════════════════════════════════════════════════════════
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: playwright/package-lock.json

      - name: Install dependencies
        working-directory: playwright
        run: npm ci

      - name: Run unit tests — npm run test:unit
        working-directory: playwright
        run: npm run test:unit

      - name: Publish unit test results to GitHub Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Unit Tests"
          path: "playwright/unit-results.xml"
          reporter: java-junit
          fail-on-error: false

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3 — Smoke Tests
  # Requires lint and unit-test to both pass.
  # Builds the Docker stack from scratch on a fresh runner, waits for health,
  # then runs the smoke suite. Reports, traces and JUnit XML are uploaded as
  # artifacts before the stack is torn down.
  # ════════════════════════════════════════════════════════════════════════════
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: playwright/package-lock.json

      - name: Install Playwright + Chromium
        working-directory: playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build Docker images
        run: docker compose -f ecommerce/docker-compose.yml build

      - name: Start application stack
        run: docker compose -f ecommerce/docker-compose.yml up -d

      - name: Wait for API and DB health — GET /health
        run: |
          echo "Polling http://localhost:8081/health …"
          for i in $(seq 1 30); do
            STATUS=$(curl --silent http://localhost:8081/health \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unreachable'))" \
              2>/dev/null || echo "unreachable")
            echo "  Attempt $i / 30 — API health: $STATUS"
            if [ "$STATUS" = "ok" ]; then echo "✓ API and DB healthy"; exit 0; fi
            sleep 5
          done
          echo "✗ API/DB not healthy within 150 s"
          docker compose -f ecommerce/docker-compose.yml logs api db
          exit 1

      - name: Wait for web app — port 3000
        run: |
          for i in $(seq 1 20); do
            if curl --silent --fail http://localhost:3000 > /dev/null; then
              echo "✓ Web app ready (attempt $i / 20)"; exit 0
            fi
            echo "  Attempt $i / 20 — waiting 3 s …"; sleep 3
          done
          echo "✗ Web app not reachable within 60 s"
          docker compose -f ecommerce/docker-compose.yml logs web
          exit 1

      - name: Validate API — GET /api/products
        run: |
          COUNT=$(curl --silent --fail http://localhost:8081/api/products \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "Products returned: $COUNT"
          [ "$COUNT" -ge 1 ] || { echo "✗ /api/products returned 0 — DB seed likely failed"; exit 1; }
          echo "✓ API validation passed"

      - name: Run Playwright smoke tests
        id: smoke-run
        working-directory: playwright
        env:
          PLAYWRIGHT_HTML_REPORT: smoke-report
          PLAYWRIGHT_JUNIT_OUTPUT: smoke-results.xml
        run: npm run test:smoke
        continue-on-error: true

      - name: Publish smoke results to GitHub Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Playwright Smoke Tests"
          path: "playwright/smoke-results.xml"
          reporter: jest-junit
          fail-on-error: false

      - name: Upload smoke HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: playwright/smoke-report/
          retention-days: 7

      - name: Upload smoke JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-junit
          path: playwright/smoke-results.xml
          retention-days: 7

      - name: Upload smoke traces and screenshots
        if: steps.smoke-run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-traces-screenshots
          path: playwright/test-results/
          retention-days: 7

      - name: Collect Docker logs
        if: steps.smoke-run.outcome == 'failure'
        run: |
          docker compose -f ecommerce/docker-compose.yml logs > docker-smoke.log 2>&1

      - name: Upload Docker logs
        if: steps.smoke-run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-smoke
          path: docker-smoke.log
          retention-days: 7

      - name: Shut down Docker stack
        if: always()
        run: docker compose -f ecommerce/docker-compose.yml down -v

      - name: Fail job if smoke tests failed
        if: steps.smoke-run.outcome == 'failure'
        run: |
          echo "Smoke suite failed — see smoke-report artifact and GitHub Checks for details."
          exit 1

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4 — Regression Tests
  # Runs only when smoke passes (skipped automatically when smoke fails).
  # Brings up its own fresh Docker stack on a new runner — fully isolated.
  # ════════════════════════════════════════════════════════════════════════════
  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: [smoke]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: playwright/package-lock.json

      - name: Install Playwright + Chromium
        working-directory: playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build Docker images
        run: docker compose -f ecommerce/docker-compose.yml build

      - name: Start application stack
        run: docker compose -f ecommerce/docker-compose.yml up -d

      - name: Wait for API and DB health — GET /health
        run: |
          echo "Polling http://localhost:8081/health …"
          for i in $(seq 1 30); do
            STATUS=$(curl --silent http://localhost:8081/health \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','unreachable'))" \
              2>/dev/null || echo "unreachable")
            echo "  Attempt $i / 30 — API health: $STATUS"
            if [ "$STATUS" = "ok" ]; then echo "✓ API and DB healthy"; exit 0; fi
            sleep 5
          done
          echo "✗ API/DB not healthy within 150 s"
          docker compose -f ecommerce/docker-compose.yml logs api db
          exit 1

      - name: Wait for web app — port 3000
        run: |
          for i in $(seq 1 20); do
            if curl --silent --fail http://localhost:3000 > /dev/null; then
              echo "✓ Web app ready (attempt $i / 20)"; exit 0
            fi
            echo "  Attempt $i / 20 — waiting 3 s …"; sleep 3
          done
          echo "✗ Web app not reachable within 60 s"
          docker compose -f ecommerce/docker-compose.yml logs web
          exit 1

      - name: Validate API — GET /api/products
        run: |
          COUNT=$(curl --silent --fail http://localhost:8081/api/products \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo "0")
          echo "Products returned: $COUNT"
          [ "$COUNT" -ge 1 ] || { echo "✗ /api/products returned 0 — DB seed likely failed"; exit 1; }
          echo "✓ API validation passed"

      - name: Run Playwright regression tests
        id: regression-run
        working-directory: playwright
        env:
          PLAYWRIGHT_HTML_REPORT: regression-report
          PLAYWRIGHT_JUNIT_OUTPUT: regression-results.xml
        run: npm run test:regression
        continue-on-error: true

      - name: Publish regression results to GitHub Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: "Playwright Regression Tests"
          path: "playwright/regression-results.xml"
          reporter: jest-junit
          fail-on-error: false

      - name: Upload regression HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report
          path: playwright/regression-report/
          retention-days: 7

      - name: Upload regression JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-junit
          path: playwright/regression-results.xml
          retention-days: 7

      - name: Upload regression traces and screenshots
        if: steps.regression-run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: regression-traces-screenshots
          path: playwright/test-results/
          retention-days: 7

      - name: Collect Docker logs
        if: steps.regression-run.outcome == 'failure'
        run: |
          docker compose -f ecommerce/docker-compose.yml logs > docker-regression.log 2>&1

      - name: Upload Docker logs
        if: steps.regression-run.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-regression
          path: docker-regression.log
          retention-days: 7

      - name: Shut down Docker stack
        if: always()
        run: docker compose -f ecommerce/docker-compose.yml down -v

      - name: Fail job if regression tests failed
        if: steps.regression-run.outcome == 'failure'
        run: |
          echo "Regression suite failed — see regression-report artifact and GitHub Checks for details."
          exit 1

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5 — AI Failure Analysis
  # Runs only when smoke or regression failed (always() ensures it is not
  # skipped when a dependency job failed or was skipped).
  # Downloads the JUnit XMLs uploaded by the test jobs, calls the GitHub
  # Models API (gpt-4o-mini) and writes a Markdown table to the Summary tab.
  # ════════════════════════════════════════════════════════════════════════════
  ai-analysis:
    name: AI Failure Analysis
    runs-on: ubuntu-latest
    needs: [smoke, regression]
    if: always() && (needs.smoke.result == 'failure' || needs.regression.result == 'failure')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download smoke JUnit XML
        uses: actions/download-artifact@v4
        with:
          name: smoke-junit
          path: playwright/
        continue-on-error: true   # artifact may not exist if smoke job was skipped

      - name: Download regression JUnit XML
        uses: actions/download-artifact@v4
        with:
          name: regression-junit
          path: playwright/
        continue-on-error: true   # artifact may not exist if regression was skipped

      - name: Run AI failure analysis — write job summary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKE_RESULTS: playwright/smoke-results.xml
          REGRESSION_RESULTS: playwright/regression-results.xml
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          WORKFLOW: ${{ github.workflow }}
        run: python3 playwright/scripts/ai_analysis.py

